iles stay local</text><rect x="360" y="196" width="160" height="64" rx="10" fill="#3c4c60" stroke="#8298ad" stroke-width="1.5"/><text x="440" y="224" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">MCP proxy</text><text x="440" y="243" text-anchor="middle" font-size="11" fill="#c2cedb">repo files · SSH keys</text><rect x="608" y="84" width="336" height="56" rx="10" fill="#132c4a" stroke="#2b5590" stroke-width="1.5"/><text x="776" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#7db0ea">Frontend UI</text><text x="776" y="131" text-anchor="middle" font-size="11" fill="#5d86b8">read-only · for humans</text><rect x="608" y="196" width="336" height="64" rx="10" fill="#1a56c4" stroke="#3f74d8" stroke-width="1.5"/><text x="776" y="224" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Brain</text><text x="776" y="243" text-anchor="middle" font-size="11" fill="#c3d8f8">owns all research state</text><rect x="608" y="340" width="200" height="56" rx="10" fill="#6b4210" stroke="#9c6a1d" stroke-width="1.5"/><text x="708" y="368" text-anchor="middle" font-size="14" font-weight="600" fill="#f0d3a0">GPU sandboxes</text><text x="708" y="387" text-anchor="middle" font-size="11" fill="#c7a15f">Lambda · Thunder · Modal</text><rect x="838" y="340" width="130" height="56" rx="10" fill="#6b4210" stroke="#9c6a1d" stroke-width="1.5"/><text x="903" y="368" text-anchor="middle" font-size="14" font-weight="600" fill="#f0d3a0">Storage</text><text x="903" y="387" text-anchor="middle" font-size="11" fill="#c7a15f">artifacts</text><path d="M 440 140 L 440 192" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><text x="0" y="0" text-anchor="middle" font-size="11" fill="#9198a1"></text><path d="M 356 228 L 214 228" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><text x="0" y="0" text-anchor="middle" font-size="11" fill="#9198a1"></text><path d="M 524 228 L 602 228" fill="none" stroke="#8b949e" 