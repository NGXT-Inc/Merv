<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 992 432" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="System architecture: on your machine, agent platforms talk to the MCP proxy, which reads the research repo and sends the hosted brain project ids, never file paths; the brain owns all research state, the frontend UI reads it, and GPU sandboxes are provisioned by the brain and reached over SSH"><defs><marker id="fwd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/></marker><marker id="ret" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/></marker></defs><rect x="24" y="40" width="400" height="260" rx="14" fill="#12161d" stroke="#3d444d" stroke-width="1.5"/><text x="44" y="67" font-size="11" font-weight="600" letter-spacing="1.5" fill="#9198a1">YOUR MACHINE</text><rect x="568" y="40" width="400" height="260" rx="14" fill="#0f1a2b" stroke="#2d4468" stroke-width="1.5"/><text x="588" y="67" font-size="11" font-weight="600" letter-spacing="1.5" fill="#79a5dd">HOSTED CONTROL PLANE</text><rect x="48" y="84" width="352" height="56" rx="10" fill="#1b2129" stroke="#3d444d" stroke-width="1.5"/><text x="224" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#e6edf3">Agent platform</text><text x="224" y="131" text-anchor="middle" font-size="11" fill="#9198a1">Claude Code · Codex · Cursor · Gemini CLI · OpenCode</text><rect x="48" y="196" width="160" height="64" rx="10" fill="#1b2129" stroke="#3d444d" stroke-width="1.5"/><text x="128" y="224" text-anchor="middle" font-size="14" font-weight="600" fill="#e6edf3">Research repo</text><text x="128" y="243" text-anchor="middle" font-size="11" fill="#9198a1">files stay local</text><rect x="240" y="196" width="160" height="64" rx="10" fill="#1b2129" stroke="#3d444d" stroke-width="1.5"/><text x="320" y="224" text-anchor="middle" font-size="14" font-weight="600" fill="#e6edf3">MCP proxy</text><text x="320" y="243" text-anchor="middle" font-size="11" fill="#9198a1">repo files · SSH keys</text><rect x="592" y="196" width="352" height="64" rx="10" fill="#1b2129" stroke="#3d444d" stroke-width="1.5"/><text x="768" y="224" text-anchor="middle" font-size="14" font-weight="600" fill="#e6edf3">Brain — owns all research state</text><text x="768" y="243" text-anchor="middle" font-size="11" fill="#9198a1">projects · experiments · reviews · reflections</text><rect x="592" y="84" width="352" height="56" rx="10" fill="#1b2129" stroke="#3d444d" stroke-width="1.5"/><text x="768" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#e6edf3">Frontend UI</text><text x="768" y="131" text-anchor="middle" font-size="11" fill="#9198a1">humans watch strategy down to execution</text><rect x="396" y="340" width="200" height="64" rx="10" fill="#0d1117" stroke="#3d444d" stroke-width="1.5" stroke-dasharray="5 4"/><text x="496" y="368" text-anchor="middle" font-size="14" font-weight="600" fill="#9198a1">GPU sandboxes</text><text x="496" y="387" text-anchor="middle" font-size="11" fill="#6e7781">Lambda · Thunder · Modal</text><path d="M 320 140 L 320 192" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><text x="330" y="170" text-anchor="start" font-size="11" fill="#9198a1">MCP</text><path d="M 240 228 L 212 228" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><text x="0" y="0" text-anchor="middle" font-size="11" fill="#9198a1"></text><path d="M 400 228 L 588 228" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><text x="496" y="220" text-anchor="middle" font-size="11" fill="#9198a1">project ids, never file paths</text><path d="M 768 140 L 768 192" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><text x="778" y="170" text-anchor="start" font-size="11" fill="#9198a1">reads</text><path d="M 320 260 C 320 372, 336 372, 390 372" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><text x="334" y="330" text-anchor="start" font-size="11" fill="#9198a1">SSH</text><path d="M 868 260 C 868 372, 740 372, 602 372" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><text x="846" y="340" text-anchor="start" font-size="11" fill="#9198a1">provisions</text><text x="592" y="286" font-size="11" fill="#9198a1">hosted by default — or run the brain locally</text></svg>
